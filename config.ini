[boiler]
# Static IP of the Firestar XP web interface
url = http://192.168.1.113
# Alert if Water Temp drops below this value (°F)
water_temp_min = 165
# Alert if Fire Temp drops below this value (°F)
fire_temp_min = 200

[ntfy]
# Push notifications via ntfy.sh (free, no account needed)
#
# One-time setup:
#   1. Install the ntfy app on your phone (iOS or Android)
#   2. Tap + and subscribe to your topic name
#
# Topic should be unique - anyone who knows it can receive notifications.
# Change it to something hard to guess.
topic  = your-unique-topic-name
server = https://ntfy.sh

[alerts]
# How often to poll the boiler under normal (no-alert) conditions (minutes)
normal_interval = 1

# After the 1st alert is sent, poll every N minutes
interval_after_first_alert = 10

# After the 2nd alert is sent, poll every N minutes
interval_after_second_alert = 30

# After the 3rd+ alert is sent, poll every N minutes
interval_after_third_alert = 60

# Stop sending alerts if the boiler has been in error for this many hours.
# The script will continue checking every hour for recovery.
max_error_hours = 6
